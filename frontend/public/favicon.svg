<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gold gradient for the outer structure -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047" /> <!-- yellow-300 -->
      <stop offset="50%" stop-color="#EAB308" /> <!-- yellow-500 -->
      <stop offset="100%" stop-color="#CA8A04" /> <!-- yellow-600 -->
    </linearGradient>
    <!-- White-to-slate gradient for inner blueprint skeleton -->
    <linearGradient id="white-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#CBD5E1" /> <!-- slate-300 -->
    </linearGradient>
  </defs>

  <!-- Background circle or rounded box for high visibility -->
  <rect width="512" height="512" rx="128" fill="#0B0F19" />
  
  <!-- Outer house frame -->
  <path d="M256 64 L64 214 L64 430 L448 430 L448 214 Z" fill="none" stroke="url(#gold-grad)" stroke-width="28" stroke-linejoin="round" />
  
  <!-- Inner architectural skeleton / frame lines representing scaffolding/framing -->
  <path d="M120 256 L392 256 M120 340 L392 340 M256 214 L256 430 M180 256 L180 430 M332 256 L332 430" fill="none" stroke="url(#white-grad)" stroke-width="14" stroke-linecap="round" opacity="0.85" />
  
  <!-- Roof rafters detailing -->
  <path d="M160 142 L160 90 L200 90 Z M256 64 L256 214" fill="none" stroke="url(#gold-grad)" stroke-width="14" stroke-linecap="round" />
</svg>
